<section id="apply" class="apply-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Apply for <span class="blue-text">Internship</span></h2>
      <p class="section-subtitle">Start your professional journey with Techno. Fill out the form below to apply.</p>
    </div>
    
    <div class="apply-container glass">
      <form class="apply-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Email ID</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
          </div>
          
          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
          </div>
          
          <div class="form-group">
            <label for="college">College Name</label>
            <input type="text" id="college" name="college" placeholder="Enter your college name" required>
          </div>
          
          <div class="form-group full-width">
            <label for="address">Address</label>
            <textarea id="address" name="address" rows="3" placeholder="Enter your current address" required></textarea>
          </div>
          
          <div class="form-group full-width">
            <label for="interest">Interest of Technology</label>
            <select id="interest" name="interest" required>
              <option value="" disabled selected>Select your interest</option>
              <option value="frontend">Frontend Development</option>
              <option value="backend">Backend Development</option>
              <option value="fullstack">Fullstack Development</option>
            </select>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn-primary large-btn">Submit Application</button>
        </div>
      </form>
    </div>
  </div>
</section>
