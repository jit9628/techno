<section id="apply" class="apply-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Apply for <span class="blue-text">Internship</span></h2>
      <p class="section-subtitle">Start your professional journey with Techno. Fill out the form below to apply.</p>
    </div>
    
    <div class="apply-container glass">
      <form class="apply-form" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" [(ngModel)]="formData.name" placeholder="Enter your full name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Email ID</label>
            <input type="email" id="email" name="email" [(ngModel)]="formData.email" placeholder="Enter your email address" required>
          </div>
          
          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" [(ngModel)]="formData.phone" placeholder="Enter your mobile number" required>
          </div>
          
          <div class="form-group full-width">
            <label for="interest">Interest of Technology</label>
            <select id="interest" name="interest" [(ngModel)]="formData.course" required>
              <option value="Java Full Stack">Java Full Stack</option>
              <option value="Spring Boot Microservices">Spring Boot Microservices</option>
              <option value="Angular Frontend Lead">Angular Frontend Lead</option>
              <option value="Flutter Cross-Platform">Flutter Cross-Platform</option>
            </select>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn-primary large-btn">Submit Application</button>
        </div>
      </form>
    </div>
  </div>
</section>
