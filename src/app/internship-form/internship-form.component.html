<section id="apply" class="apply-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Apply for <span class="blue-text">Internship</span></h2>
      <p class="section-subtitle">Start your professional journey with DJT Technology. Fill out the form below to apply.</p>
    </div>
    
    <div class="apply-container glass">
      <form class="apply-form">

        <!-- Section 1: Personal Information -->
        <div class="form-section-title">Personal Information</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="fullname">Full Name <span class="required">*</span></label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Email ID <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
          </div>
          
          <div class="form-group">
            <label for="mobile">Mobile Number <span class="required">*</span></label>
            <input type="tel" id="mobile" name="mobile" placeholder="+91 XXXXX XXXXX" required>
          </div>

          <div class="form-group">
            <label for="whatsapp">WhatsApp Number</label>
            <input type="tel" id="whatsapp" name="whatsapp" placeholder="+91 XXXXX XXXXX">
          </div>
          
          <div class="form-group">
            <label for="dob">Date of Birth <span class="required">*</span></label>
            <input type="date" id="dob" name="dob" required>
          </div>

          <div class="form-group">
            <label for="gender">Gender <span class="required">*</span></label>
            <select id="gender" name="gender" required>
              <option value="" disabled selected>Select Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="address">Current Address <span class="required">*</span></label>
            <textarea id="address" name="address" rows="3" placeholder="Enter your current address" required></textarea>
          </div>

          <div class="form-group">
            <label for="city">City <span class="required">*</span></label>
            <input type="text" id="city" name="city" placeholder="Enter your city" required>
          </div>

          <div class="form-group">
            <label for="state">State <span class="required">*</span></label>
            <input type="text" id="state" name="state" placeholder="Enter your state" required>
          </div>
        </div>

        <!-- Section 2: Education Details -->
        <div class="form-section-title">Education Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="college">College / University Name <span class="required">*</span></label>
            <input type="text" id="college" name="college" placeholder="Enter your college name" required>
          </div>

          <div class="form-group">
            <label for="degree">Degree / Course <span class="required">*</span></label>
            <select id="degree" name="degree" required>
              <option value="" disabled selected>Select Degree</option>
              <option value="btech">B.Tech / B.E.</option>
              <option value="bca">BCA</option>
              <option value="bsc">B.Sc (CS/IT)</option>
              <option value="mtech">M.Tech / M.E.</option>
              <option value="mca">MCA</option>
              <option value="msc">M.Sc (CS/IT)</option>
              <option value="diploma">Diploma</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="branch">Branch / Specialization <span class="required">*</span></label>
            <input type="text" id="branch" name="branch" placeholder="e.g. Computer Science, IT" required>
          </div>

          <div class="form-group">
            <label for="year">Current Year / Semester <span class="required">*</span></label>
            <select id="year" name="year" required>
              <option value="" disabled selected>Select Year</option>
              <option value="1st">1st Year</option>
              <option value="2nd">2nd Year</option>
              <option value="3rd">3rd Year</option>
              <option value="4th">4th Year</option>
              <option value="graduated">Graduated</option>
            </select>
          </div>

          <div class="form-group">
            <label for="cgpa">CGPA / Percentage <span class="required">*</span></label>
            <input type="text" id="cgpa" name="cgpa" placeholder="e.g. 8.5 or 85%" required>
          </div>

          <div class="form-group">
            <label for="passout">Expected Graduation Year <span class="required">*</span></label>
            <select id="passout" name="passout" required>
              <option value="" disabled selected>Select Year</option>
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
              <option value="2027">2027</option>
              <option value="2028">2028</option>
            </select>
          </div>
        </div>

        <!-- Section 3: Internship Preferences -->
        <div class="form-section-title">Internship Preferences</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="interest">Interest of Technology <span class="required">*</span></label>
            <select id="interest" name="interest" required>
              <option value="" disabled selected>Select your interest</option>
              <option value="frontend">Frontend Development</option>
              <option value="backend">Backend Development</option>
              <option value="fullstack">Fullstack Development</option>
              <option value="mobile">Mobile App Development</option>
              <option value="datascience">Data Science / ML</option>
              <option value="devops">DevOps / Cloud</option>
              <option value="cybersecurity">Cybersecurity</option>
              <option value="uiux">UI/UX Design</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="duration">Preferred Internship Duration <span class="required">*</span></label>
            <select id="duration" name="duration" required>
              <option value="" disabled selected>Select Duration</option>
              <option value="1month">1 Month</option>
              <option value="2months">2 Months</option>
              <option value="3months">3 Months</option>
              <option value="6months">6 Months</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mode">Preferred Mode <span class="required">*</span></label>
            <select id="mode" name="mode" required>
              <option value="" disabled selected>Select Mode</option>
              <option value="remote">Remote / Work from Home</option>
              <option value="onsite">On-site / Office</option>
              <option value="hybrid">Hybrid</option>
            </select>
          </div>

          <div class="form-group">
            <label for="start_date">Available Start Date <span class="required">*</span></label>
            <input type="date" id="start_date" name="start_date" required>
          </div>

          <div class="form-group full-width">
            <label for="skills">Skills / Technologies You Know <span class="required">*</span></label>
            <input type="text" id="skills" name="skills" placeholder="e.g. HTML, CSS, JavaScript, React, Node.js, Python" required>
          </div>
        </div>

        <!-- Section 4: Additional Information -->
        <div class="form-section-title">Additional Information</div>
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="experience">Any Prior Experience</label>
            <textarea id="experience" name="experience" rows="3" placeholder="Describe any prior internship, project or work experience (if any)"></textarea>
          </div>

          <div class="form-group">
            <label for="linkedin">LinkedIn Profile URL</label>
            <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/yourprofile">
          </div>

          <div class="form-group">
            <label for="github">GitHub Profile URL</label>
            <input type="url" id="github" name="github" placeholder="https://github.com/yourusername">
          </div>

          <div class="form-group">
            <label for="portfolio">Portfolio / Website URL</label>
            <input type="url" id="portfolio" name="portfolio" placeholder="https://yourportfolio.com">
          </div>

          <div class="form-group">
            <label for="reference">How did you hear about us? <span class="required">*</span></label>
            <select id="reference" name="reference" required>
              <option value="" disabled selected>Select</option>
              <option value="social_media">Social Media</option>
              <option value="friend">Friend / Referral</option>
              <option value="college">College / Campus</option>
              <option value="website">Website</option>
              <option value="job_portal">Job Portal</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="message">Why do you want to intern with us?</label>
            <textarea id="message" name="message" rows="4" placeholder="Tell us about your motivation and what you hope to learn..."></textarea>
          </div>

          <div class="form-group full-width">
            <label for="resume">Upload Resume (PDF) <span class="required">*</span></label>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required>
          </div>
        </div>

        <!-- Terms Agreement -->
        <div class="terms-check">
          <label class="checkbox-label">
            <input type="checkbox" required>
            <span>I agree to the <a routerLink="/privacy">Privacy Policy</a> and <a routerLink="/disclaimer">Disclaimer</a>. I confirm that all the information provided is accurate. <span class="required">*</span></span>
          </label>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn-primary large-btn">Submit Application</button>
        </div>
      </form>
    </div>
  </div>
</section>
